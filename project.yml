name: XianxiaIsland
options:
  bundleIdPrefix: com.xianxiaisland
  deploymentTarget:
    iOS: "18.6"
  xcodeVersion: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  XianxiaIsland:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Scenes
      - path: Models
      - path: Components
      - path: Resources
    settings:
      PRODUCT_NAME: XianxiaIsland
      PRODUCT_BUNDLE_IDENTIFIER: com.xianxiaisland.app
      INFOPLIST_FILE: App/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: "1"
      IPHONEOS_DEPLOYMENT_TARGET: "18.6"
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"

schemes:
  XianxiaIsland:
    build:
      targets:
        XianxiaIsland: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
